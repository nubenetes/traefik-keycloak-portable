apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app: oauth2-proxy
    {{- include "tk.labels" . | nindent 4 }}
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
      protocol: TCP
