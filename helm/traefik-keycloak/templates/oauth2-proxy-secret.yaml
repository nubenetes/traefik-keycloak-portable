{{- /*
Rendered only when secret.mode=inline. For secret.mode=external (default) the
Secret is created out-of-band (Sealed Secrets / External Secrets / manual) and
this chart only references it by name.
*/ -}}
{{- if eq .Values.secret.mode "inline" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tk.labels" . | nindent 4 }}
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: {{ .Values.secret.clientId | quote }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ .Values.secret.clientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ .Values.secret.cookieSecret | quote }}
{{- end }}
