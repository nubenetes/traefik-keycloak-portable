{{- /*
External Secrets Operator (ESO) integration. Rendered only when
secret.mode=external-secrets. Pulls the oauth2-proxy credentials from a backend
(e.g. HashiCorp Vault) into the Secret the oauth2-proxy Deployment references.
No secret material lives here — only references. See docs/external-secrets.md.
*/ -}}
{{- if eq .Values.secret.mode "external-secrets" }}
{{- $es := .Values.secret.externalSecrets }}
{{- if $es.createServiceAccount }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $es.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tk.labels" . | nindent 4 }}
---
{{- end }}
{{- if $es.createStore }}
apiVersion: {{ $es.apiVersion }}
kind: {{ $es.storeRef.kind }}
metadata:
  name: {{ $es.storeRef.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tk.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ $es.vault.server | quote }}
      path: {{ $es.vault.path | quote }}
      version: {{ $es.vault.version | quote }}
      {{- with $es.vault.caProvider }}
      {{- if . }}
      caProvider:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ $es.vault.auth.kubernetes.mountPath | quote }}
          role: {{ $es.vault.auth.kubernetes.role | quote }}
          serviceAccountRef:
            name: {{ $es.serviceAccountName }}
---
{{- end }}
apiVersion: {{ $es.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ .Values.secret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tk.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $es.refreshInterval | quote }}
  secretStoreRef:
    name: {{ $es.storeRef.name }}
    kind: {{ $es.storeRef.kind }}
  target:
    name: {{ .Values.secret.name }}
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: OAUTH2_PROXY_CLIENT_ID
      remoteRef:
        key: {{ $es.remoteRef.key | quote }}
        property: {{ $es.remoteRef.clientIdProperty | quote }}
    - secretKey: OAUTH2_PROXY_CLIENT_SECRET
      remoteRef:
        key: {{ $es.remoteRef.key | quote }}
        property: {{ $es.remoteRef.clientSecretProperty | quote }}
    - secretKey: OAUTH2_PROXY_COOKIE_SECRET
      remoteRef:
        key: {{ $es.remoteRef.key | quote }}
        property: {{ $es.remoteRef.cookieSecretProperty | quote }}
{{- end }}
