# =============================================================================
# oauth2-proxy Secret — managed OUT-OF-BAND (not by ArgoCD).
#
# Copy this template, fill in the values, and apply it once to the cluster:
#   cp secrets/oauth2-proxy-secret.example.yaml secrets/oauth2-proxy-secret.yaml
#   # edit secrets/oauth2-proxy-secret.yaml
#   kubectl apply -f secrets/oauth2-proxy-secret.yaml
#
# The real file (secrets/oauth2-proxy-secret.yaml) is in .gitignore.
#
# COOKIE_SECRET must be 16, 24 or 32 bytes. Generate it with:
#   openssl rand -base64 32 | tr -- '+/' '-_'
#
# CLIENT_SECRET comes from the 'traefik-dashboard' client in Keycloak
# (Clients -> traefik-dashboard -> Credentials).
#
# ── GitOps alternatives ──────────────────────────────────────────────────────
# To keep the secret IN git safely, use Sealed Secrets or the External Secrets
# Operator and reference it with secret.mode=external (the chart default). For a
# quick dev run you can instead let the chart render it with secret.mode=inline.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: traefik
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: "traefik-dashboard"
  # Placeholders — REPLACE both before applying (do not ship these).
  OAUTH2_PROXY_CLIENT_SECRET: "REPLACE-with-keycloak-client-secret"
  OAUTH2_PROXY_COOKIE_SECRET: "REPLACE-run-openssl-rand-base64-32"
