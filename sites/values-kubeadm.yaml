# =============================================================================
# Platform preset: vanilla kubeadm (and any generic CNCF-conformant cluster)
# =============================================================================
# Assumes PodSecurity 'restricted' is enforced on the target namespace and a
# LoadBalancer provider (MetalLB by default) is installed.
#
# Install:
#   helm install traefik ./helm/traefik-keycloak -f sites/values-kubeadm.yaml \
#     --set dashboard.host=traefik.apps.mycluster.com \
#     --set dashboard.cookieDomain=.apps.mycluster.com \
#     --set keycloak.issuerUrl=https://keycloak.apps.mycluster.com/realms/myrealm
# =============================================================================
platform: kubeadm

caTrust:
  mode: none

loadBalancer:
  backend: metallb

traefik:
  service:
    annotations: {}
    # metallb.io/address-pool: traefik-pool

  podSecurityContext:
    runAsUser: 65532
    runAsGroup: 65532
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
